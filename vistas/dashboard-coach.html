<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Coach | SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-layout">
    <nav class="sidebar">
        <img src="../assets/LogosPortClub.png" class="img-fluid mb-5 p-2">
        <a href="#" class="nav-link active"><i class="bi bi-person-badge-fill me-2"></i> Mis Atletas</a>
        <a href="#" class="nav-link text-white-50"><i class="bi bi-journal-check me-2"></i> Planes de Entrenamiento</a>
        <button onclick="logout()" class="btn btn-outline-danger w-100 mt-auto rounded-pill">SALIR</button>
    </nav>

    <main class="main-content">
        <div class="mb-5">
            <h1 class="fw-bold text-gradient">CENTRAL DE COACHING</h1>
            <p class="text-white-50">Bienvenido, Coach. Aquí puedes supervisar la información técnica y confidencial de tus atletas.</p>
        </div>

        <div class="glass-card shadow-lg">
            <h5 class="text-gold fw-bold mb-4"><i class="bi bi-search me-2"></i>ATLETAS BAJO TU CARGO</h5>
            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle">
                    <thead class="table-light text-dark">
                        <tr>
                            <th>FOTO</th>
                            <th>ATLETA</th>
                            <th>EMAIL</th>
                            <th>DEPORTE BASE</th>
                            <th class="text-center">EXPEDIENTE</th>
                        </tr>
                    </thead>
                    <tbody id="tablaAtletas">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalAtleta" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white border-info">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title text-info fw-bold"><i class="bi bi-lock-fill me-2"></i>Información Confidencial del Atleta</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="detalleAtletaBody">
                    </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-info" data-bs-dismiss="modal">Cerrar Expediente</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/coach.js"></script>
</body>
</html>
