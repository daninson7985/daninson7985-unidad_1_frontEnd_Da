<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro | SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="auth-card" style="max-width: 500px;">
        <h3 class="fw-bold text-gold mb-4">ÚNETE AL CLUB</h3>
        
        <form id="formRegistro">
            <input type="text" class="form-control-sport" placeholder="Nombre Completo" required>
            <input type="email" class="form-control-sport" placeholder="Email" required>
            
            <select class="form-control-sport">
                <option value="user">Soy Atleta</option>
                <option value="coach">Soy Entrenador</option>
            </select>

            <div class="row">
                <div class="col-6"><input type="password" class="form-control-sport" placeholder="Clave" required></div>
                <div class="col-6"><input type="password" class="form-control-sport" placeholder="Repetir" required></div>
            </div>

            <button type="submit" class="btn btn-sport mt-2">Crear Cuenta</button>
            <a href="login.html" class="auth-link d-block mt-4 text-white-50">¿Ya tienes cuenta? Inicia Sesión</a>
        </form>
    </div>

</body>
</html>
