<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SportClub | Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <div class="auth-card shadow-lg">
        <img src="../assets/LogosPortClub.png" class="mb-4" style="height: 70px;">
        <h2 class="fw-black mb-4">BIENVENIDO</h2>
        
        <form id="loginForm">
            <input type="email" id="loginEmail" class="form-control-sport" placeholder="Correo Electrónico" required>
            <input type="password" id="loginPass" class="form-control-sport" placeholder="Contraseña" required>
            
            <div id="loginError" class="text-danger small fw-bold mb-3 d-none">Credenciales Incorrectas</div>
            
            <button type="submit" class="btn btn-sport mb-4 shadow">Ingresar a la Arena</button>
            
            <div class="d-flex justify-content-between">
                <a href="recuperacion.html" class="auth-link">¿Olvidaste tu clave?</a>
                <a href="registro.html" class="auth-link text-white">Registrarme</a>
            </div>
        </form>
    </div>

    <script src="../js/login.js"></script>
</body>
</html>
