<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil | SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="dashboard-layout">
    <nav class="sidebar">
        <img src="../assets/LogosPortClub.png" class="img-fluid mb-5 p-2">
        <a href="#" class="nav-link active"><i class="bi bi-person-circle me-2"></i> Mis Datos</a>
        <a href="#" class="nav-link text-white-50"><i class="bi bi-trophy-fill me-2"></i> Mis Logros</a>
        <button onclick="logout()" class="btn btn-outline-danger w-100 mt-auto rounded-pill">CERRAR SESIÓN</button>
    </nav>

    <main class="main-content">
        <h1 class="fw-bold text-gradient mb-1">MI ESPACIO PERSONAL</h1>
        <p class="text-white-50 mb-5">Aquí puedes actualizar tu información y gestionar tus preferencias deportivas.</p>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="glass-card text-center border-warning shadow">
                    <img src="../assets/usagi.png" class="rounded-circle border border-warning p-1 mb-3" style="width: 120px; background: white;">
                    <h4 class="fw-bold" id="infoName">Daninson Soto</h4>
                    <p class="text-white-50 small" id="infoEmail">user1@demo.cl</p>
                    <hr class="border-secondary">
                    <div class="text-start px-3">
                        <label class="label-gold small d-block">DEPORTE:</label>
                        <p class="fw-bold mb-2">Football</p>
                        <label class="label-gold small d-block">FRECUENCIA:</label>
                        <p class="fw-bold mb-0">3 veces por semana</p>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="glass-card">
                    <h5 class="text-gold fw-bold mb-4">MODIFICAR MI INFORMACIÓN</h5>
                    <form id="formPerfilUsuario" class="row g-3">
                        <div class="col-md-6">
                            <label class="label-gold">NOMBRE COMPLETO</label>
                            <input type="text" id="editNombre" class="form-control bg-dark text-white border-secondary" placeholder="Ej: Daninson Soto">
                        </div>
                        <div class="col-md-6">
                            <label class="label-gold">FECHA NACIMIENTO</label>
                            <input type="date" id="editFecha" class="form-control bg-dark text-white border-secondary">
                        </div>
                        <div class="col-md-12">
                            <label class="label-gold">CORREO ELECTRÓNICO</label>
                            <input type="email" id="editEmail" class="form-control bg-dark text-white border-secondary" disabled>
                            <small class="text-white-50">El correo no puede ser modificado por seguridad.</small>
                        </div>
                        
                        <div class="col-12 mt-4">
                            <h5 class="text-white border-bottom border-secondary pb-2">CAMBIAR CONTRASEÑA</h5>
                        </div>
                        <div class="col-md-6">
                            <label class="label-gold">NUEVA CLAVE</label>
                            <input type="password" id="pass1" class="form-control bg-dark text-white border-secondary">
                        </div>
                        <div class="col-md-6">
                            <label class="label-gold">CONFIRMAR CLAVE</label>
                            <input type="password" id="pass2" class="form-control bg-dark text-white border-secondary">
                        </div>

                        <div class="col-12 text-end mt-4">
                            <button type="submit" class="btn btn-sport px-5">ACTUALIZAR DATOS</button>
                        </div>
                        <div id="feedbackUsuario" class="text-center fw-bold mt-2"></div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/usuario.js"></script>
</body>
</html>
