<!DOCTYPE html>
<html lang="es">

</head>
<body>

    <div class="auth-card">
        <h3 class="fw-bold text-gold mb-3">RECUPERACIÓN</h3>

            <button type="submit" class="btn btn-sport mb-3">Enviar Instrucciones</button>
            <a href="login.html" class="auth-link text-white-50">Volver al Login</a>
