<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-corporate">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <img src="logoSportClub.png" alt="Logo" height="30">
                <span>| Administración Central</span>
            </a>
        </div>
    </nav>

    <main class="container py-4">
        <section class="row g-4">
            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h2 class="fw-bold text-primary">154</h2>
                    <p class="text-muted mb-0">Usuarios Totales</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-4 text-center">
                    <h2 class="fw-bold text-success">12</h2>
                    <p class="text-muted mb-0">Clases del Día</p>
                </div>
            </div>
            <div class="col-md-4 text-center">
                <img src="usagi.png" alt="Usagi" class="usagi-float" style="width: 80px;">
                <p class="fw-bold mt-2">Sistema Operativo</p>
            </div>
        </section>
        
        <div class="card p-4 mt-4 shadow-sm">
            <h5 class="fw-bold mb-3">Gestión de Usuarios</h5>
            <table class="table">
                <thead class="table-light"><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Acción</th></tr></thead>
                <tbody>
                    <tr><td>Admin Master</td><td>admin@sportclub.com</td><td><span class="badge" style="background-color: var(--sport-purple);">Admin</span></td><td><button class="btn btn-sm btn-secondary">Editar</button></td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <footer><p class="mb-0">&copy; 2026 SportClub. Sistema de Gestión.</p></footer>
</body>
</html>
