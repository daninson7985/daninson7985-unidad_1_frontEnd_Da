<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Clave - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Fondo amarillo basado en el logo */
        body {
            background-color: var(--sport-gold);
            background-image: linear-gradient(180deg, #F2B705 0%, #f7d060 100%);
        }
        .card {
            border: 3px solid var(--sport-purple);
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <main class="container">
        <section class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-3">
                    <img src="usagi.png" alt="Usagi Ayuda" class="usagi-float" style="width: 80px;">
                </div>

                <div class="card p-5 shadow-lg text-center">
                    <img src="logoSportClub.png" alt="Logo SportClub" height="60" class="mb-4 mx-auto d-block">
                    
                    <header class="mb-4">
                        <h3 class="text-corporate fw-bold">¿Olvidaste tu clave?</h3>
                        <p class="text-muted small">No te preocupes, te enviaremos un enlace de ayuda.</p>
                    </header>

                    <form action="login.html">
                        <div class="mb-4 text-start">
                            <label class="form-label fw-bold">Ingresa tu correo</label>
                            <input type="email" class="form-control rounded-pill border-2" placeholder="tu@correo.com" required>
                        </div>
                        <button type="submit" class="btn btn-corporate w-100 mb-4 shadow" onclick="alert('¡Yaha! Enlace enviado con éxito.')">Enviar Enlace</button>
                    </form>

                    <nav>
                        <a href="login.html" class="text-corporate fw-bold text-decoration-none small">Volver al Login</a>
                    </nav>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p class="mb-0">&copy; 2026 SportClub. Todos los derechos reservados.</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
