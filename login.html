<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Socios - SportClub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-3">
                    <img src="usagi.png" alt="Usagi" class="usagi-float" style="width: 100px;">
                </div>
                <div class="card p-5 shadow-lg">
                    <div class="text-center mb-4">
                        <img src="logoSportClub.png" alt="Logo" height="50" class="mb-3">
                        <h3 class="fw-bold">Bienvenido</h3>
                    </div>
                    <form action="dashboard-usuario.html">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control rounded-pill" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">Contraseña</label>
                            <input type="password" class="form-control rounded-pill" required>
                        </div>
                        <button type="submit" class="btn btn-corporate w-100">Ingresar</button>
                    </form>
                    <div class="mt-4 text-center">
                        <a href="recuperacion.html" class="text-decoration-none small text-muted">¿Olvidaste tu clave?</a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
